# monitoring/grafana/provisioning/datasources/prometheus.yml
#
# Grafana charge automatiquement cette datasource au démarrage.
# Plus besoin de configurer manuellement dans l'UI.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      httpMethod: POST