global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  external_labels:
    env: "dev"
    project: "valorisation-donnee-meteo"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "django-backend"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["backend:8000"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "backend-django"
  - job_name: "frontend"
    static_configs:
      - targets: ["frontend:3002"]
