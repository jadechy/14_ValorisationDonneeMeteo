name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install backend dependencies
        run: |
          cd backend
          uv sync --extra dev

      - name: Run backend tests
        run: |
          cd backend
          uv run pytest

      - name: Run backend linter
        run: |
          cd backend
          uv run ruff check .

      - name: Security scan
        run: |
          pip install bandit
          bandit -r backend


  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Run frontend checks
        run: |
          cd frontend
          npm run check

      - name: Build frontend
        run: |
          cd frontend
          npm run build


  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t valometeo .

      - name: Login to DockerHub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag valometeo ${{ secrets.DOCKER_USERNAME }}/valometeo:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/valometeo:latest